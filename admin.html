<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>لوحة التحكم — سجل الديون</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0d12;--surface:#13161f;--surface2:#1a1e2b;--border:#252a3a;--green:#00d97e;--red:#ff4d6d;--gold:#f5c842;--blue:#3d8bff;--text:#e8eaf0;--muted:#636b85;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:24px 16px 60px;}
h1{font-size:20px;font-weight:800;text-align:center;margin-bottom:20px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
.ig{margin-bottom:12px;}
.ig label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.ifield{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Cairo';font-size:15px;outline:none;direction:ltr;text-align:right;}
.bsub{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Cairo';font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;}
.bim{background:linear-gradient(135deg,#00d97e,#00b868);color:#002a18;}
.bgold{background:linear-gradient(135deg,#f5c842,#d9a832);color:#2a2000;}
.bgray{background:var(--surface2);color:var(--text);border:1.5px solid var(--border);}
.bred{background:var(--surface2);color:var(--red);border:1.5px solid var(--red);}
.row{display:flex;gap:8px;}
.row .bsub{flex:1;}
.err{color:var(--red);font-size:12.5px;min-height:16px;margin-bottom:8px;}
.info{color:var(--muted);font-size:12.5px;margin-bottom:8px;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.card div{font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;direction:ltr;}
.card div span:first-child{color:var(--muted);direction:rtl;}
.badge{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge.on{background:rgba(0,217,126,0.15);color:var(--green);}
.badge.off{background:rgba(255,77,109,0.15);color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚙️ لوحة تحكم — سجل الديون</h1>

  <div id="loginPanel" class="panel">
    <div class="ig"><label>إيميل المدير</label><input class="ifield" type="email" id="adEmail"></div>
    <div class="ig"><label>كلمة السر</label><input class="ifield" type="password" id="adPass"></div>
    <div class="err" id="loginErr"></div>
    <button class="bsub bim" onclick="adminLogin()">دخول</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <div class="panel">
      <div class="ig"><label>إيميل الزبون أو الـ UID للمستند</label><input class="ifield" type="text" id="searchEmail" placeholder="example@mail.com أو معرف الحساب"></div>
      <button class="bsub bgray" onclick="searchUser()">🔍 بحث ذكي</button>
      <div class="err" id="searchErr"></div>
      <button class="bsub bgray" onclick="listAllUsers()" style="margin-top:14px;">📋 عرض كل الحسابات</button>
    </div>

    <div id="listPanel" class="panel" style="display:none;"></div>

    <div id="resultCard" style="display:none;">
      <div class="card">
        <div><span>المعرف (Doc ID):</span><span id="rDocId" style="font-size:11px;color:var(--muted);user-select:all;"></span></div>
        <div><span>الإيميل:</span><span id="rEmail"></span></div>
        <div><span>رسائل مستخدمة:</span><span id="rMsg"></span></div>
        <div><span>حالة الاشتراك:</span><span id="rStatus"></span></div>
        <div><span>ينتهي بتاريخ:</span><span id="rExpiry"></span></div>
      </div>
      <div class="panel">
        <div class="row">
          <button class="bsub bim" onclick="activate(30)">✅ فعّل شهر</button>
          <button class="bsub bgold" onclick="activate(365)">✅ فعّل سنة</button>
        </div>
        <button class="bsub bred" onclick="deactivate()">❌ إلغاء الاشتراك</button>
        <button class="bsub bgray" onclick="resetMsgCount()">🔄 تصفير عداد الرسائل</button>
      </div>
    </div>

    <button class="bsub bgray" onclick="adminLogout()">⏻ خروج</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6awQ5eNAFGn-RIYAERd2-b8cglKOpXKg",
  authDomain: "debt-system-b9dba.firebaseapp.com",
  projectId: "debt-system-b9dba",
  storageBucket: "debt-system-b9dba.firebasestorage.app",
  messagingSenderId: "1027318586227",
  appId: "1:1027318586227:web:3c5ad206bbcc5da4c6c306",
  measurementId: "G-5BGFKSP5Z0"
};
firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();
const ADMIN_EMAIL = 'abdurrahmanb1222@gmail.com';
let currentDocId = null;

function adminLogin() {
  const email = document.getElementById('adEmail').value.trim();
  const pass = document.getElementById('adPass').value;
  document.getElementById('loginErr').textContent = '';
  if (email.toLowerCase() !== ADMIN_EMAIL.toLowerCase()) {
    document.getElementById('loginErr').textContent = 'هاد الإيميل مش مخول لدخول لوحة التحكم';
    return;
  }
  fbAuth.signInWithEmailAndPassword(email, pass).catch(err=>{
    document.getElementById('loginErr').textContent = 'خطأ: ' + err.message;
  });
}

function adminLogout() { fbAuth.signOut(); }

fbAuth.onAuthStateChanged(user => {
  if (user && user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  } else {
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('adminPanel').style.display = 'none';
  }
});

// مصفوفة مؤقتة لحفظ الحسابات لتجنب مشاكل علامات التنصيص في الـ onclick
let loadedUsers = {};

function listAllUsers() {
  const panel = document.getElementById('listPanel');
  panel.style.display = 'block';
  panel.innerHTML = '<div class="info">⏳ عم نجيب القائمة...</div>';
  
  fbDb.collection('backups').get().then(snap=>{
    if (snap.empty) { panel.innerHTML = '<div class="info">ما في حسابات بالداتابيز</div>'; return; }
    
    loadedUsers = {}; // تصفير المصفوفة
    let html = '<div class="ptitle" style="font-weight:700;margin-bottom:10px;">كل الحسابات (' + snap.size + ')</div>';
    
    snap.forEach(doc=>{
      const d = doc.data() || {};
      const id = doc.id;
      loadedUsers[id] = d; // حفظ البيانات محلياً
      
      const label = d.email || ('(بدون إيميل — ' + id.slice(0,8) + '...)');
      
      let active = false;
      if (d.subscribed && d.subExpiry) {
        try { active = (new Date(d.subExpiry+'T23:59:59').getTime() > Date.now()); } catch(e){}
      }
      
      // تم التعديل هنا لتمرير الـ ID بأمان تاري وبدون كراش
      html += `<button class="bsub bgray" style="text-align:right;margin-bottom:6px;display:flex;justify-content:space-between;" onclick="selectDoc('${id}')">` +
        `<span>${active ? '⭐ ' : ''}${label}</span> <span style="font-size:10px;color:var(--muted);">${id.slice(0,5)}</span></button>`;
    });
    panel.innerHTML = html;
  }).catch(err=>{
    panel.innerHTML = '<div class="err">صار خطأ: ' + err.message + '</div>';
  });
}

function displayUserData(docId, data) {
  if (!data) data = {};
  document.getElementById('rDocId').textContent = docId;
  document.getElementById('rEmail').textContent = data.email || '(حساب جديد / بدون إيميل)';
  
  let active = false;
  if (data.subscribed && data.subExpiry) {
    try {
      active = (new Date(data.subExpiry+'T23:59:59').getTime() > Date.now());
    } catch(e) { active = false; }
  }
  
  if (active) {
    document.getElementById('rMsg').textContent = (data.msgCount||0) + ' / بدون حد (مشترك)';
    document.getElementById('rStatus').innerHTML = '<span class="badge on">مشترك ✅</span>';
  } else {
    document.getElementById('rMsg').textContent = (data.msgCount||0) + ' / 50';
    document.getElementById('rStatus').innerHTML = '<span class="badge off">مش مشترك</span>';
  }
  
  document.getElementById('rExpiry').textContent = data.subExpiry || '-';
  document.getElementById('resultCard').style.display = 'block';
}

function selectDoc(docId) {
  currentDocId = docId;
  // جلب البيانات مباشرة للتأكد من أحدث حالة من السيرفر
  fbDb.collection('backups').doc(docId).get().then(doc=>{
    displayUserData(docId, doc.exists ? doc.data() : {});
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  }).catch(err => {
    // إذا فشل السيرفر لأي سبب، نعرض المحفوظ محلياً كخيار احتياطي
    displayUserData(docId, loadedUsers[docId] || {});
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
  });
}

function searchUser() {
  const queryStr = document.getElementById('searchEmail').value.trim();
  document.getElementById('searchErr').textContent = '';
  document.getElementById('resultCard').style.display = 'none';
  if (!queryStr) { document.getElementById('searchErr').textContent = 'اكتب الإيميل أو الـ UID للبحث'; return; }
  
  fbDb.collection('backups').doc(queryStr).get().then(doc => {
    if (doc.exists) {
      currentDocId = doc.id;
      displayUserData(doc.id, doc.data());
    } else {
      fbDb.collection('backups').where('email', '==', queryStr).limit(1).get().then(snap => {
        if (snap.empty) {
          fbDb.collection('backups').where('email', '==', queryStr.toLowerCase()).limit(1).get().then(snap2 => {
            if (snap2.empty) {
              document.getElementById('searchErr').textContent = 'لم يتم العثور على الحساب بالإيميل أو المعرف المكتوب';
            } else {
              const d = snap2.docs[0];
              currentDocId = d.id;
              displayUserData(d.id, d.data());
            }
          });
        } else {
          const d = snap.docs[0];
          currentDocId = d.id;
          displayUserData(d.id, d.data());
        }
      });
    }
  }).catch(err => {
    document.getElementById('searchErr').textContent = 'صار خطأ في البحث: ' + err.message;
  });
}

function addDays(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}

function activate(days) {
  if (!currentDocId) return;
  const expiry = addDays(days);
  
  fbDb.collection('backups').doc(currentDocId).set({
    subscribed: true, 
    subExpiry: expiry, 
    msgCount: 0
  }, {merge:true}).then(()=>{
    alert('✅ تم تفعيل الاشتراك بنجاح وتصفير العداد لغاية ' + expiry);
    fbDb.collection('backups').doc(currentDocId).get().then(doc => displayUserData(currentDocId, doc.data()));
  }).catch(err=> alert('خطأ أثناء التفعيل: ' + err.message));
}

function deactivate() {
  if (!currentDocId) return;
  fbDb.collection('backups').doc(currentDocId).set({subscribed:false}, {merge:true}).then(()=>{
    alert('✅ تم إلغاء الاشتراك');
    fbDb.collection('backups').doc(currentDocId).get().then(doc => displayUserData(currentDocId, doc.data()));
  }).catch(err=> alert('خطأ: ' + err.message));
}

function resetMsgCount() {
  if (!currentDocId) return;
  fbDb.collection('backups').doc(currentDocId).set({msgCount:0}, {merge:true}).then(()=>{
    alert('✅ تم تصفير العداد بنجاح');
    fbDb.collection('backups').doc(currentDocId).get().then(doc => displayUserData(currentDocId, doc.data()));
  }).catch(err=> alert('خطأ: ' + err.message));
}
</script>
</body>
</html>
