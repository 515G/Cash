<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<title>سجل الديون</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0d12; --surface:#13161f; --surface2:#1a1e2b; --border:#252a3a;
  --green:#00d97e; --red:#ff4d6d; --gold:#f5c842; --blue:#3d8bff; --purple:#a855f7;
  --text:#e8eaf0; --muted:#636b85; --dim:#8b92a8;
  --glow-g:0 0 24px rgba(0,217,126,0.25); --glow-r:0 0 24px rgba(255,77,109,0.25);
  --r:16px; --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo','Tajawal',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(245,200,66,0.06),transparent 60%),radial-gradient(ellipse 50% 50% at 10% 80%,rgba(61,139,255,0.05),transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,0.015) 39px,rgba(255,255,255,0.015) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,0.015) 39px,rgba(255,255,255,0.015) 40px);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:20px 16px 80px;}

.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--dim);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:14px;}
.backlink:hover{color:var(--text);}

.header{text-align:center;padding:6px 0 22px;}
.hicon{width:58px;height:58px;background:linear-gradient(135deg,#2a2410,#1f1a0f);border:1.5px solid rgba(245,200,66,0.3);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:26px;box-shadow:0 0 24px rgba(245,200,66,0.2);}
.header h1{font-family:'Tajawal';font-size:22px;font-weight:800;background:linear-gradient(135deg,#fff 30%,#a0a8c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header p{font-size:12px;color:var(--muted);margin-top:3px;font-weight:300;}

.dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;}
.card-label{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;}
.ci .dot{background:var(--green);box-shadow:0 0 8px var(--green);}
.ce .dot{background:var(--red);box-shadow:0 0 8px var(--red);}
.val{font-family:'Tajawal';font-size:19px;font-weight:800;direction:ltr;text-align:right;}
.ci .val{color:var(--green);}
.ce .val{color:var(--red);}
.cur{font-size:0.6em;opacity:0.7;margin-right:2px;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px;}
.ptitle{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:15px;display:flex;align-items:center;gap:7px;}

.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.tbtn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 8px;cursor:pointer;font-family:'Cairo';font-size:13px;font-weight:600;color:var(--dim);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tbtn.inc.on{background:rgba(0,217,126,0.1);border-color:var(--green);color:var(--green);box-shadow:var(--glow-g);}
.tbtn.exp.on{background:rgba(255,77,109,0.1);border-color:var(--red);color:var(--red);box-shadow:var(--glow-r);}

.ig{margin-bottom:11px;}
.ig label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.ifield{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:11px 14px;color:var(--text);font-family:'Cairo';font-size:15px;font-weight:500;outline:none;transition:border-color 0.2s,box-shadow 0.2s;direction:rtl;}
.ifield::placeholder{color:var(--muted);font-weight:300;}
.ifield:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(61,139,255,0.1);}
input[type=number].ifield{direction:ltr;text-align:right;}
input[type=tel].ifield{direction:ltr;text-align:right;}
.phonerow{display:flex;gap:8px;}
.phonerow .ifield{flex:1;}
.bpick{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:0 15px;color:var(--dim);font-size:18px;cursor:pointer;flex-shrink:0;}
.bpick:hover{border-color:var(--blue);color:var(--blue);}

.bsub{width:100%;padding:13px;border:none;border-radius:var(--rs);font-family:'Cairo';font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;}
.bsub:active{transform:scale(0.98);}
.bim{background:linear-gradient(135deg,#00d97e,#00b868);color:#002a18;box-shadow:var(--glow-g);}
.bem{background:linear-gradient(135deg,#ff4d6d,#d93354);color:#1a0008;box-shadow:var(--glow-r);}

.searchbar{margin-bottom:12px;}

.txp{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.txh{padding:13px 17px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.txt{font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px;}
.txc{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;color:var(--dim);}

.glist{list-style:none;}
.gcard{border-bottom:1px solid var(--border);}
.gcard:last-child{border-bottom:none;}
.ghead{display:flex;align-items:center;gap:10px;padding:13px 17px;background:rgba(255,255,255,0.015);}
.gic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.gic.lent{background:rgba(0,217,126,0.1);}
.gic.borrowed{background:rgba(255,77,109,0.1);}
.gin{flex:1;min-width:0;}
.gname{font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gsub{font-size:11px;color:var(--muted);margin-top:1px;}
.gtotal{font-family:'Tajawal';font-size:16px;font-weight:800;direction:ltr;flex-shrink:0;}
.gtotal.lent{color:var(--green);}
.gtotal.borrowed{color:var(--red);}
.bwa{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;font-size:15px;flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;}
.bwa:hover{background:rgba(0,217,126,0.12);color:var(--green);}

.ditem{display:flex;align-items:center;gap:8px;padding:10px 17px 10px 17px;padding-right:56px;border-top:1px dashed rgba(255,255,255,0.04);}
.ditem .dd{flex:1;min-width:0;font-size:12.5px;font-weight:500;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ditem .dt{font-size:10.5px;color:var(--muted);margin-top:1px;direction:ltr;text-align:right;}
.ditem .da{font-family:'Tajawal';font-size:13px;font-weight:700;direction:ltr;flex-shrink:0;}
.ditem .da.lent{color:var(--green);}
.ditem .da.borrowed{color:var(--red);}
.bpay{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;font-size:12px;flex-shrink:0;}
.bpay:hover{background:rgba(0,217,126,0.1);color:var(--green);}
.bdel{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:6px;font-size:12px;flex-shrink:0;}
.bdel:hover{background:rgba(255,77,109,0.1);color:var(--red);}
.paidnote{padding:6px 17px 10px 56px;font-size:11px;color:var(--muted);}

.empty{text-align:center;padding:40px 24px;color:var(--muted);}
.empty .ei{font-size:36px;margin-bottom:10px;opacity:0.4;}
.empty p{font-size:13px;font-weight:300;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.mo.show{opacity:1;pointer-events:all;}
.mdl{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px;max-width:300px;width:100%;text-align:center;transform:scale(0.95);transition:transform 0.2s;}
.mo.show .mdl{transform:scale(1);}
.mi{font-size:32px;margin-bottom:11px;}
.mdl h3{font-size:16px;font-weight:700;margin-bottom:6px;}
.mdl p{font-size:13px;color:var(--muted);font-weight:300;line-height:1.6;margin-bottom:18px;}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bcnl{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px;font-family:'Cairo';font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;}
.bcdl{background:linear-gradient(135deg,#ff4d6d,#d93354);border:none;border-radius:var(--rs);padding:10px;font-family:'Cairo';font-size:13px;font-weight:700;color:#fff;cursor:pointer;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:30px;padding:9px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:200;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">


  <div class="header">
    <div class="hicon">💳</div>
    <h1>سجل الديون</h1>
    <p>تجميع حسب الزبون — تذكير واتساب تلقائي</p>
  </div>

  <div class="dash">
    <div class="card ci">
      <div class="card-label"><span class="dot"></span>ديون لنا (عند الزبائن)</div>
      <div class="val" id="debtToUs"><span class="cur">د.أ</span>0.000</div>
    </div>
    <div class="card ce">
      <div class="card-label"><span class="dot"></span>ديون علينا (لحدا تاني)</div>
      <div class="val" id="debtByUs"><span class="cur">د.أ</span>0.000</div>
    </div>
  </div>

  <div class="panel">
    <div class="ptitle">💳 تسجيل دين جديد</div>
    <div class="trow">
      <button class="tbtn inc on" id="btnLent" onclick="setDType('lent')">👤 زبون مدين للمحل</button>
      <button class="tbtn exp" id="btnBorrowed" onclick="setDType('borrowed')">🏪 المحل مدين لحدا</button>
    </div>
    <div class="ig">
      <label>اسم الشخص</label>
      <input class="ifield" type="text" id="debtName" placeholder="مثال: أبو محمد" maxlength="50">
    </div>
    <div class="ig">
      <label>رقم الواتساب (لإرسال تذكير تلقائي)</label>
      <div class="phonerow">
        <input class="ifield" type="tel" id="debtPhone" placeholder="07xxxxxxxx" maxlength="15">
        <button type="button" class="bpick" onclick="pickContact()" title="اختيار من جهات الاتصال">📇</button>
      </div>
    </div>
    <div class="ig">
      <label>البيان / سبب الدين</label>
      <input class="ifield" type="text" id="debtDesc" placeholder="مثال: بضاعة، سلفة..." maxlength="80">
    </div>
    <div class="ig">
      <label>المبلغ (دينار)</label>
      <input class="ifield" type="number" id="debtAmt" placeholder="0.000" min="0" step="0.001">
    </div>
    <button class="bsub bim" id="debtSubBtn" onclick="addDebt()">✓ تسجيل الدين</button>
  </div>

  <div class="ig searchbar">
    <input class="ifield" type="text" id="searchInp" placeholder="🔍 دوّر باسم الزبون..." oninput="render()">
  </div>

  <div class="txp">
    <div class="txh">
      <div class="txt">📋 الزبائن <span class="txc" id="custCnt">0</span></div>
    </div>
    <ul class="glist" id="debtGroups">
      <li class="empty"><div class="ei">💳</div><p>لا توجد ديون مسجلة</p></li>
    </ul>
  </div>

</div>

<!-- Modal -->
<div class="mo" id="modal">
  <div class="mdl">
    <div class="mi" id="mIcon">⚠️</div>
    <h3 id="mTitle"></h3>
    <p id="mMsg"></p>
    <div class="mbtns">
      <button class="bcnl" onclick="closeMo()">إلغاء</button>
      <button class="bcdl" id="mConfirm">تأكيد</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK = 'cash_store_v2';
let dtype = 'lent', pending = null;

function load() {
  try {
    const d = JSON.parse(localStorage.getItem(SK)) || {debts:[]};
    d.debts = d.debts || [];
    return d;
  } catch { return {debts:[]}; }
}
function save(d) { localStorage.setItem(SK, JSON.stringify(d)); }

function fmt(n) { return n.toLocaleString('ar-JO',{minimumFractionDigits:3,maximumFractionDigits:3}); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setDType(t) {
  dtype = t;
  document.getElementById('btnLent').classList.toggle('on', t==='lent');
  document.getElementById('btnBorrowed').classList.toggle('on', t==='borrowed');
  const b = document.getElementById('debtSubBtn');
  b.className = 'bsub ' + (t==='lent'?'bim':'bem');
  b.textContent = t==='lent' ? '✓ تسجيل دين (زبون)' : '✓ تسجيل دين (علينا)';
}

async function pickContact() {
  if (!('contacts' in navigator) || !('ContactsManager' in window)) {
    toast('📵 هالميزة تشتغل بس على كروم أندرويد');
    return;
  }
  try {
    const contacts = await navigator.contacts.select(['name','tel'], {multiple:false});
    if (contacts && contacts.length) {
      const c = contacts[0];
      if (c.name && c.name[0]) document.getElementById('debtName').value = c.name[0];
      if (c.tel && c.tel[0]) document.getElementById('debtPhone').value = c.tel[0];
      toast('✅ تم جلب بيانات الزبون');
    }
  } catch (err) {
    toast('⚠️ ما قدرنا نفتح جهات الاتصال');
  }
}

function cleanPhone(phone) {
  let p = (phone||'').replace(/[^\d]/g,'');
  if (!p) return '';
  if (p.startsWith('00')) p = p.slice(2);
  if (p.startsWith('0')) p = '962'+p.slice(1);
  else if (!p.startsWith('962')) p = '962'+p;
  return p;
}

function buildReminderMsg(name, items) {
  const total = items.reduce((s,x)=>s+x.amount,0);
  const lines = items.map(x=>'- '+(x.desc||'دين')+': '+fmt(x.amount)+' د.أ ('+x.date+')').join('\n');
  return `مرحباً ${name}، عندك دين مسجل عند محلنا:\n${lines}\n\nالمجموع الكلي: ${fmt(total)} د.أ\nنرجو التكرم بالتسديد بأقرب وقت ممكن. شكراً لتفهمك 🙏`;
}

function waLinkFor(phone, msg) {
  const p = cleanPhone(phone);
  if (!p) return '#';
  return `https://wa.me/${p}?text=${encodeURIComponent(msg)}`;
}

function addDebt() {
  const name  = document.getElementById('debtName').value.trim();
  const phone = document.getElementById('debtPhone').value.trim();
  const desc  = document.getElementById('debtDesc').value.trim();
  const amt   = parseFloat(document.getElementById('debtAmt').value);
  if (!name) { toast('✏️ أدخل اسم الشخص'); return; }
  if (isNaN(amt)||amt<=0) { toast('💰 أدخل مبلغاً صحيحاً'); return; }
  const d=load(), now=new Date();
  d.debts.unshift({id:Date.now(),type:dtype,name,phone,desc,amount:amt,paid:false,
    date:now.toLocaleDateString('ar-JO'),
    time:now.toLocaleTimeString('ar-JO',{hour:'2-digit',minute:'2-digit'})});
  save(d);
  document.getElementById('debtName').value='';
  document.getElementById('debtPhone').value='';
  document.getElementById('debtDesc').value='';
  document.getElementById('debtAmt').value='';
  render();

  if (dtype==='lent' && phone) {
    const pClean = cleanPhone(phone);
    const mine = load().debts.filter(x=>x.type==='lent' && !x.paid && x.phone && cleanPhone(x.phone)===pClean);
    if (mine.length) {
      window.open(waLinkFor(phone, buildReminderMsg(name, mine)), '_blank');
      toast('✅ تم تسجيل الدين وفتح واتساب');
      return;
    }
  }
  toast('✅ تم تسجيل الدين');
}

function payDebt(id) {
  const d=load();
  const deb = d.debts.find(x=>x.id===id);
  if (!deb || deb.paid) return;
  openMo('✅','تسديد الدين','هل تم تسديد دين '+deb.name+' بقيمة '+fmt(deb.amount)+' د.أ؟',()=>{
    const d2=load();
    const deb2 = d2.debts.find(x=>x.id===id);
    if (!deb2) return;
    deb2.paid = true;
    const now=new Date();
    deb2.paidDate = now.toLocaleDateString('ar-JO');
    save(d2); render();
    toast('✅ تم تسديد الدين');
  });
}

function delDebt(id) {
  openMo('🗑️','حذف الدين','هل تريد حذف سجل هذا الدين بس؟ باقي ديون الزبون رح تضل موجودة.',()=>{
    const d=load();
    d.debts=d.debts.filter(x=>x.id!==id);
    save(d); render(); toast('🗑 تم الحذف');
  });
}

function sendReminder(phone, name, items) {
  window.open(waLinkFor(phone, buildReminderMsg(name, items)), '_blank');
}

function groupDebts(debts) {
  const groups = {};
  const order = [];
  debts.forEach(x=>{
    const key = x.type + '|' + (x.phone ? cleanPhone(x.phone) : ('n:'+x.name.trim().toLowerCase()));
    if (!groups[key]) { groups[key] = {type:x.type, name:x.name, phone:x.phone, items:[]}; order.push(key); }
    groups[key].items.push(x);
    if (x.phone) groups[key].phone = x.phone;
    groups[key].name = x.name || groups[key].name;
  });
  return order.map(k=>groups[k]);
}

function render() {
  const d=load(), debts=d.debts;
  let owedToUs=0, owedByUs=0;
  debts.forEach(x=>{ if(!x.paid){ if(x.type==='lent') owedToUs+=x.amount; else owedByUs+=x.amount; } });
  document.getElementById('debtToUs').innerHTML=`<span class="cur">د.أ</span>${fmt(owedToUs)}`;
  document.getElementById('debtByUs').innerHTML=`<span class="cur">د.أ</span>${fmt(owedByUs)}`;

  const q = (document.getElementById('searchInp').value||'').trim().toLowerCase();
  let groups = groupDebts(debts);
  if (q) groups = groups.filter(g=>g.name.toLowerCase().includes(q));
  document.getElementById('custCnt').textContent = groups.length;

  const wrap = document.getElementById('debtGroups');
  if (!groups.length) {
    wrap.innerHTML = '<li class="empty"><div class="ei">💳</div><p>لا توجد ديون مسجلة</p></li>';
    return;
  }
  wrap.innerHTML = groups.map(g=>{
    const unpaid = g.items.filter(x=>!x.paid);
    const paid = g.items.filter(x=>x.paid);
    const total = unpaid.reduce((s,x)=>s+x.amount,0);
    const waBtn = (g.type==='lent' && g.phone && unpaid.length)
      ? `<button class="bwa" title="إرسال تذكير الآن" onclick='sendReminder(${JSON.stringify(g.phone)}, ${JSON.stringify(g.name)}, ${JSON.stringify(unpaid)})'>📱</button>` : '';
    const itemsHtml = unpaid.map(x=>`
      <div class="ditem">
        <div class="dd">${esc(x.desc||'دين')}<div class="dt">${x.date} — ${x.time}</div></div>
        <div class="da ${g.type}">${fmt(x.amount)}</div>
        <button class="bpay" title="تسديد" onclick="payDebt(${x.id})">✓</button>
        <button class="bdel" title="حذف" onclick="delDebt(${x.id})">✕</button>
      </div>`).join('');
    const paidHtml = paid.length ? `<div class="paidnote">✅ ${paid.length} دين مسدد سابقاً بقيمة ${fmt(paid.reduce((s,x)=>s+x.amount,0))} د.أ</div>` : '';
    return `
    <li class="gcard">
      <div class="ghead">
        <div class="gic ${g.type}">${g.type==='lent'?'👤':'🏪'}</div>
        <div class="gin">
          <div class="gname">${esc(g.name)}</div>
          <div class="gsub">${unpaid.length ? unpaid.length+' دين غير مسدد' : 'كل الديون مسددة'}</div>
        </div>
        <div class="gtotal ${g.type}">${fmt(total)}</div>
        ${waBtn}
      </div>
      ${itemsHtml}
      ${paidHtml}
    </li>`;
  }).join('');
}

function openMo(icon,title,msg,cb) {
  document.getElementById('mIcon').textContent=icon;
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mMsg').textContent=msg;
  pending=cb;
  document.getElementById('modal').classList.add('show');
  document.getElementById('mConfirm').onclick=()=>{ closeMo(); pending&&pending(); };
}
function closeMo() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeMo(); });

let tt;
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2200);
}

['debtName','debtPhone','debtDesc','debtAmt'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') addDebt(); }));

render();
</script>
</body>
